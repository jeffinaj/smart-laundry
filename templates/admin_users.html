{% extends "admin_base.html" %}
{% block admin_title %}Users{% endblock %}
{% block admin_content %}
  <section class="card">
    <div class="card-header">
      <h3>All Users</h3>
      <input type="search" id="user-search" placeholder="Search users..." />
    </div>
    <div class="table-scroll">
      <table class="admin-table">
        <thead>
          <tr><th>User ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Action</th></tr>
        </thead>
        <tbody id="users-table-body"></tbody>
      </table>
    </div>
  </section>
{% endblock %}
