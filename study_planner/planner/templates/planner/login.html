{% extends 'base.html' %}
{% block content %}
  <div class="auth-box">
    <h2>Login</h2>
    <form method="post">{% csrf_token %}
      <label>Username<input name="username" required></label>
      <label>Password<input type="password" name="password" required></label>
      <button type="submit">Login</button>
    </form>
  </div>
{% endblock %}
